<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">

    <title>
      {% if page.title %}
        {{ page.title }} | {{ site.name }}
      {% else %}
        {{ site.name }}
      {% endif %}
    </title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="{{ site.description | escape }}">
    <meta name="theme-color" content="#222222">

    <!-- Open Graph / social preview -->
    <meta property="og:title" content="{{ page.title | default: site.name }}">
    <meta property="og:description" content="{{ site.description | escape }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ site.url }}{{ page.url }}">

    <!-- If you add a hero image later, set its path here -->
    <!-- <meta property="og:image" content="{{ site.url }}{{ '/static/img/gairelab_og_image.jpg' | relative_url }}"> -->

    <!-- Favicon -->
    <link rel="icon" href="{{ '/static/img/favicon.ico' | relative_url }}">

    <!-- Bootstrap 4 -->
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
      integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh"
      crossorigin="anonymous"
    >

    {% if page.group == 'news' %}
      <link
        rel="alternate"
        type="application/atom+xml"
        title="Gaire Lab News Feed"
        href="{{ '/news.xml' | relative_url }}"
      >
    {% endif %}

    <!-- Local CSS -->
    <link href="{{ '/static/css/syntax.css' | relative_url }}" rel="stylesheet">
    <link href="{{ '/static/css/custom.css' | relative_url }}" rel="stylesheet">

    <!-- Optional JS -->
    <script type="text/javascript" src="https://www.google.com/jsapi"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.1/jquery.min.js"></script>

    <!-- Bootstrap JS for navbar collapse on mobile -->
    <script
      src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"
      integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
      crossorigin="anonymous">
    </script>

    <script
      src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"
      integrity="sha384-3qaqj0lcD5jKXc5E4zN9E6Dk9gA5B6C0X5J0nE9vrFica8FWHZcizxgxYkWwaP2a"
      crossorigin="anonymous">
    </script>

    <!--[if lt IE 9]>
      <script src="https://html5shim.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->
  </head>

  <body>

    <!-- Top navigation bar -->
    <nav class="navbar navbar-expand-md navbar-dark shadow-sm" style="background-color:#cc0000;">
      <div class="container">

        <a class="navbar-brand font-weight-bold" href="{{ '/' | relative_url }}">
          {{ site.name }}
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-toggle="collapse"
          data-target="#navbarContent"
          aria-controls="navbarContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">
          <ul class="navbar-nav ml-auto">

            {% for link in site.data.navlinks %}
              {% if page.group == link.group %}
                <li class="nav-item active">
                  <a class="nav-link" href="{{ link.link | relative_url }}" aria-label="{{ link.name }}">
                    {{ link.name }} <span class="sr-only">(current)</span>
                  </a>
                </li>
              {% else %}
                <li class="nav-item">
                  <a class="nav-link" href="{{ link.link | relative_url }}" aria-label="{{ link.name }}">
                    {{ link.name }}
                  </a>
                </li>
              {% endif %}
            {% endfor %}

          </ul>
        </div>
      </div>
    </nav>

    <div class="container mt-4 mb-5">
      <!-- Page content will be injected here by Jekyll layouts -->
