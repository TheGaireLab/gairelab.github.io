- month: "May 2026"
  title: "Dr. Gaire invited to speak at the 11th Annual COCR Meeting"
  text: "Dr. Gaire was invited to speak at the 11th Annual Meeting of the Center of Excellence in Obesity and Cardiometabolic Research (COCR) at the TTUHSC Academic Event Center. The meeting theme, “Advancing Chronic Disease Prevention: From Translational Solutions to Community Impact,” highlights innovative research spanning basic science, clinical applications, and population health."

- month: "May 2026"
  title: "Gaire Lab awarded multi-year USDA NIFA grant"
  text: "Dr. Gaire was awarded a multi-year, multi-institutional USDA NIFA grant to study Streptococcus suis disease in swine, with a focus on respiratory microbiome ecology, pathogen genomics, and improved disease prevention."

- month: "January 2026"
  title: "Dr. Gaire presents research at CRWAD"
  text: "Dr. Gaire presented two research abstracts at the Conference of Research Workers in Animal Diseases (CRWAD), highlighting ongoing work in infectious disease epidemiology, antimicrobial resistance, microbiome science, and food safety."

- month: "January 2026"
  title: "Gaire Lab welcomes Ranjita Bastola"
  text: "The Gaire Lab is thrilled to welcome Ranjita Bastola, DVM, who joined the lab in Spring 2026 as our first graduate student. Ranjita’s research will focus on microbial ecology and pathogen genomics of bovine liver abscess disease, leveraging metagenomic sequencing and whole-genome sequencing approaches. Welcome to the team, Ranjita!"

- month: "December 2025"
  title: "Dr. Gaire selected for NIH Grant Development Group"
  text: "Dr. Gaire was selected by TTU Research Development & Communications to participate in the Bouvier NIH Grant Development Group, a university-wide grant development initiative supporting competitive NIH proposal preparation."

- month: "September 2025"
  title: "Dr. Gaire’s poster accepted for the Allen D. Leman Swine Conference"
  text: "Dr. Gaire’s poster was accepted for presentation at the 2025 Allen D. Leman Swine Conference at the University of Minnesota."

- month: "August 2025"
  title: "The Gaire Lab opens at Texas Tech University"
  text: "The Gaire Lab officially opened its doors at the Texas Tech University School of Veterinary Medicine in Amarillo, Texas. The lab focuses on One Health, infectious disease epidemiology, antimicrobial resistance, microbiome science, pathogen genomics, and food safety."
