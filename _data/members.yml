# Graduate Students
- name: Ranjita Bastola
  image: /static/img/members/RB.jpg
  pronouns:
  position: MS Student
  group: Current Team
  email:
  description: >-
    Ranjita is a graduate student in the Gaire Lab. Her research focuses on
    microbial ecology and pathogen genomics of bovine liver abscess disease,
    using microbiome sequencing and whole-genome sequencing approaches.

# Veterinary Research Scholars
- name: Khale Lucero
  image: /static/img/members/IMG_Khale.jpeg
  position: Veterinary Research Scholar
  group: Current Team
  email:
  description: >-
    Khale is originally from Bloomfield, New Mexico. Before Texas Tech, he earned
    his bachelor’s degree in Animal Science from New Mexico State University in
    2025. He is currently pursuing his DVM at the Texas Tech University School of
    Veterinary Medicine, with aspirations of becoming a mixed animal practitioner
    or further advancing his education. Khale’s summer research focuses on how
    management factors are associated with respiratory disease, diarrhea, and
    microbiome development during the preweaning period in beef-on-dairy and
    Holstein calves.

- name: Monet Hunt 
  image: /static/img/members/IMG_Monet.jpeg
  position: Veterinary Research Scholar
  group: Current Team
  email:
  description: >-
    Monet was raised in Broadview, New Mexico, where she found her passion for
    working with large animals. She completed her Animal Science degree at New
    Mexico State University. She is currently pursuing her DVM at the Texas Tech
    University School of Veterinary Medicine, with the goal of helping rural
    communities across New Mexico and Texas. Her summer research focuses on
    swine health and farm environmental microbiomes, with an emphasis on farm
    hygiene, disease monitoring, and the connections among environmental
    microbes, animal health, and public health outcomes.

